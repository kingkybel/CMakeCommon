name: Build dependency cache

on:
  workflow_call:
    inputs:
      dependency-name:
        required: true
        type: string
      dependency-version:
        required: true
        type: string
      build:
        required: false
        type: boolean
        default: true
      cmake-version:
        required: false
        type: string
        default: '3.26.4'
      build-type:
        required: false
        type: string
        default: Release
    secrets: {}

jobs:
  build-dependency:
    runs-on: ubuntu-latest
    env:
      DKYB_DEPENDENCY_CACHE_ROOT: ${{ github.workspace }}/build/dkyb-cache
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install CMake
        run: |
          set -euo pipefail
          if [ -x "$(command -v cmake)" ]; then
            installed_version=$(cmake --version | head -n1 | awk '{print $3}')
            if [ "$installed_version" = "${{ inputs.cmake-version }}" ]; then
              echo "CMake $installed_version is already installed, skipping installation."
              exit 0
            else
              echo "CMake $installed_version is installed but does not match required version ${{ inputs.cmake-version }}, installing required version."
            fi
          else
            echo "CMake is not installed, installing required version ${{ inputs.cmake-version }}."
          fi
          if ! python3 -m pip --version >/dev/null 2>&1; then
            if python3 -c "import ensurepip" >/dev/null 2>&1; then
              python3 -m ensurepip --upgrade >/dev/null
            else
              sudo apt-get update
              sudo apt-get install -y python3-pip
            fi
          fi
          python3 -m pip install --user --upgrade pip >/dev/null
          python3 -m pip install --user --no-cache-dir "cmake==${{ inputs.cmake-version }}"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: build/dkyb-cache
          key: deps-${{ inputs.dependency-name }}-${{ inputs.dependency-version }}-${{ hashFiles('cmake/**') }}
          restore-keys: |
            deps-${{ inputs.dependency-name }}-${{ inputs.dependency-version }}-
            deps-${{ inputs.dependency-name }}-
      - name: Configure dependency runner
        run: |
          cmake -S cmake-common/cmake/dependency -B build \
            -DDKYB_DEPENDENCY_NAME=${{ inputs.dependency-name }} \
            -DDKYB_DEPENDENCY_VERSION=${{ inputs.dependency-version }} \
            -DDKYB_DEPENDENCY_BUILD=${{ inputs.build }} \
            -DDKYB_DEPENDENCY_CACHE_ROOT=${{ env.DKYB_DEPENDENCY_CACHE_ROOT }} \
            -DCMAKE_BUILD_TYPE=${{ inputs.build-type }}
      - name: Build dependency
        run: cmake --build build --target dkyb_dependency_runner --config ${{ inputs.build-type }}
      - name: Install dependency
        run: |
          set -euo pipefail
          version="${{ inputs.dependency-version }}"
          sanitized_version=$(printf '%s' "$version" | sed 's/[^A-Za-z0-9]/_/g' | tr '[:upper:]' '[:lower:]')
          install_dir="${{ env.DKYB_DEPENDENCY_CACHE_ROOT }}/${{ inputs.dependency-name }}/${sanitized_version}/install"
          if [ -d "$install_dir" ]; then
            sudo cp -r "$install_dir"/* /usr
          else
            echo "##[warning]No install tree found at $install_dir (sanitized version $sanitized_version), skipping."
          fi
      - name: Package cached dependency
        run: |
          mkdir -p artifacts
          tar -czf artifacts/dependency-${{ inputs.dependency-name }}-${{ inputs.dependency-version }}.tar.gz -C build/dkyb-cache ${{ inputs.dependency-name }}
      - name: Publish dependency artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-${{ inputs.dependency-name }}-${{ inputs.dependency-version }}
          path: artifacts
